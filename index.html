<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Indian Cities & Monuments</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #ffecd2, #fcb69f);
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .container-box {
            margin-top: 80px;
            padding: 40px;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            color: #d63384;
            font-weight: bold;
        }

        .monument {
            margin-top: 30px;
            font-size: 24px;
            font-weight: bold;
            color: #0d6efd;
        }

        
    </style>
</head>
<body>

<div class="container">
    <div class="container-box col-md-6 mx-auto">
        <h1>🏛 Indian Cities</h1>
        <p class="mb-4">Select a city to see its famous monument</p>

        <!-- Dropdown -->
        <select class="form-select" onchange="showMonument(this.value)">
            <option value="">-- Select City --</option>
            <option value="Delhi">Delhi</option>
            <option value="Agra">Agra</option>
            <option value="Mumbai">Mumbai</option>
            <option value="Jaipur">Jaipur</option>
            <option value="Hyderabad">Hyderabad</option>
        </select>

        <!-- Output -->
        <div id="result" class="monument"></div>
    </div>

    
</div>

<script>
    function showMonument(city) {
        let monument = "";

        if (city === "Delhi") {
            monument = "🕌 Red Fort";
        } 
        else if (city === "Agra") {
            monument = "🤍 Taj Mahal";
        } 
        else if (city === "Mumbai") {
            monument = "🌊 Gateway of India";
        } 
        else if (city === "Jaipur") {
            monument = "🏰 Hawa Mahal";
        } 
        else if (city === "Hyderabad") {
            monument = "🕌 Charminar";
        } 
        else {
            monument = "";
        }

        document.getElementById("result").innerHTML = monument;
    }
</script>

</body>
</html>
